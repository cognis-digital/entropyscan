name: ports
on: [push, pull_request]
permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Smoke + unit tests
        run: |
          node index.js --version
          node --test

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vet, test, build
        run: |
          go vet ./...
          go test -v ./...
          go build -o /tmp/entropyscan-go .
          /tmp/entropyscan-go --version

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test + build
        run: |
          cargo test --quiet
          cargo build --release --quiet
          ./target/release/entropyscan --version
